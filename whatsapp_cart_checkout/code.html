<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for chat feel */
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        /* WhatsApp-like message tails */
        .bubble-in::before {
            content: "";
            position: absolute;
            top: 0;
            left: -8px;
            width: 12px;
            height: 12px;
            background: #ffffff;
            clip-path: polygon(100% 0, 0 0, 100% 100%);
        }
        /* Fade in animation for sequential messages */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.5s; }
    </style>

<!-- Bot Message: Cart Summary -->

<div class="relative bg-white p-3 rounded-r-xl rounded-bl-xl shadow-sm max-w-[85%] bubble-in">

1x Organic A2 Milk (1L)

Total: <span class="font-bold">₹45,095</span>

Deliver to: <span class="text-primary font-semibold">842 Market St, Suite 102?</span></div>
<div class="text-right mt-1">
<span class="text-[11px] text-[#667781]">10:42 AM</span>
</div>
</div>

<div class="flex flex-col w-[85%] space-y-1">

<span class="material-symbols-outlined">mic</span>
</div>

<!-- BottomNavBar (Hidden on this specific task-focused checkout screen per requirements, but template allows for it) -->
<!-- Suppressed to prioritize the chat flow -->
<script>
        function confirmOrder() {
            const paymentStep = document.getElementById('payment-step');
            paymentStep.classList.remove('hidden');
            
            // Scroll to bottom
            const container = document.getElementById('chat-canvas');
            setTimeout(() => {
                container.scrollTo({
                    top: container.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);

            // Optional: Hide previous buttons to focus the flow
            event.currentTarget.closest('.flex-col').style.opacity = '0.5';
            event.currentTarget.closest('.flex-col').style.pointerEvents = 'none';
        }

        // Handle enter key in input
        document.querySelector('input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (text.trim() !== "") {
                    // This is a mockup, we just clear it
                    e.target.value = "";
                }
            }
        });
    </script>
