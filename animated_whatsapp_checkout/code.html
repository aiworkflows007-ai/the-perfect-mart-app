<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Perfect Mart - Checkout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for chat feel */
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        /* WhatsApp-like message tails */
        .bubble-in::before {
            content: "";
            position: absolute;
            top: 0;
            left: -8px;
            width: 12px;
            height: 12px;
            background: #ffffff;
            clip-path: polygon(100% 0, 0 0, 100% 100%);
        }
        
        /* Animations */
        @keyframes messagePop {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            70% { transform: scale(1.05) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
            50% { transform: scale(1.01); box-shadow: 0 4px 12px rgba(0, 128, 105, 0.1); }
        }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-4px); opacity: 1; }
        }

        @keyframes blueCheck {
            from { color: #8696a0; }
            to { color: #53bdeb; }
        }

        .animate-message-pop {
            animation: messagePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-slide-up {
            animation: slideUpFade 0.4s ease-out forwards;
        }

        .animate-pulse-cta {
            animation: pulse-soft 2s infinite ease-in-out;
        }

        .check-read {
            animation: blueCheck 0.5s ease forwards;
            animation-delay: 1.2s;
        }

        .typing-dot {
            animation: typing 1s infinite ease-in-out;
        }

        .btn-interact {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .btn-interact:active {
            transform: scale(0.97);
        }

        .delay-0 { animation-delay: 0.1s; }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.5s; }
        .delay-4 { animation-delay: 0.6s; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eaf0e3",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#fff4f5",
                        "tertiary-fixed": "#ffd9e3",
                        "granite-accent": "#475569",
                        "surface-container-highest": "#dee5d8",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#ecf3e6",
                        "surface-main": "#FFFFFF",
                        "tertiary": "#a1275e",
                        "surface-container-lowest": "#ffffff",
                        "cosmetics-accent": "#FF85A2",
                        "surface": "#f5fbee",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#584400",
                        "on-tertiary-fixed": "#3e001e",
                        "on-background": "#171d15",
                        "on-error": "#ffffff",
                        "surface-variant": "#F3F4F6",
                        "secondary": "#745b00",
                        "on-tertiary-fixed-variant": "#89104c",
                        "on-secondary-fixed": "#241a00",
                        "on-secondary-container": "#735a00",
                        "on-primary-fixed": "#002203",
                        "inverse-primary": "#74dd6e",
                        "surface-tint": "#006e16",
                        "secondary-container": "#ffd24c",
                        "primary-fixed-dim": "#74dd6e",
                        "secondary-fixed-dim": "#edc23c",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#8ffb87",
                        "error-container": "#ffdad6",
                        "background": "#f5fbee",
                        "surface-dim": "#d6dccf",
                        "surface-container-low": "#eff6e9",
                        "on-primary-container": "#e0ffd7",
                        "tertiary-container": "#c14177",
                        "status-error": "#DC2626",
                        "outline-variant": "#becab7",
                        "on-primary-fixed-variant": "#00530e",
                        "secondary-fixed": "#ffe08d",
                        "surface-bright": "#f5fbee",
                        "inverse-surface": "#2c322a",
                        "surface-container-high": "#e4eadd",
                        "status-warning": "#F59E0B",
                        "primary": "#006714",
                        "status-success": "#16A34A",
                        "outline": "#6f7a6a",
                        "primary-container": "#0c831f",
                        "on-surface-variant": "#3f4a3c",
                        "on-surface": "#171d15",
                        "tertiary-fixed-dim": "#ffb0c9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "gutter": "12px",
                        "container-margin": "16px",
                        "touch-target": "48px",
                        "stack-lg": "24px",
                        "stack-sm": "8px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "price-lg": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-eta": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "price-lg": ["18px", {"lineHeight": "24px", "fontWeight": "700"}],
                        "label-bold": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "body-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "display-eta": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["18px", {"lineHeight": "24px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-container shadow-sm flex items-center justify-between px-container-margin h-touch-target">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="The Perfect Mart Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmPXrPX4SMT2eZt09efgjrJyMBOKssVZgvRLaI516-NDjHV20ZHsOzFYfSJeVi0k5G065LQNCa3a-hX5CxYSI-NawdnPetNOQRyw1ZxZG6mLIgdGDPoRnAA87LQOY_aEOncdieoniSmF20Llxmsh7KMqdoNE5PfeNkgWlKtDwToNAYVqXtqPflMt8ejp8Y19h9LXg1pMVdden_3wgbK2xu3afUUs5Sl_xoxVPTykMP_HCfF6VZDbE02cHlxJpD_rKqlZBFP7fV0qaQ"/>
</div>
<h1 class="text-headline-md font-headline-md font-bold text-on-surface">The Perfect Mart</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer">videocam</span>
<span class="material-symbols-outlined text-primary cursor-pointer">call</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer">more_vert</span>
</div>
</header>
<!-- Chat Canvas -->
<main class="flex-1 overflow-y-auto pt-touch-target pb-24 px-4 chat-container bg-[#efeae2]" id="chat-canvas">
<div class="max-w-md mx-auto py-6 space-y-6">
<!-- Date Divider -->
<div class="flex justify-center mb-6">
<span class="bg-[#d1d7db] text-[#54656f] text-[12px] px-3 py-1 rounded-lg uppercase tracking-wider font-semibold">Today</span>
</div>
<!-- Typing Indicator Container (Auto-hides in JS) -->
<div class="flex flex-col items-start space-y-2" id="typing-indicator">
<div class="bg-white px-4 py-3 rounded-full shadow-sm flex gap-1 items-center">
<div class="w-2 h-2 bg-[#8696a0] rounded-full typing-dot"></div>
<div class="w-2 h-2 bg-[#8696a0] rounded-full typing-dot [animation-delay:0.2s]"></div>
<div class="w-2 h-2 bg-[#8696a0] rounded-full typing-dot [animation-delay:0.4s]"></div>
</div>
</div>
<!-- Bot Message Content (Initially Hidden) -->
<div class="hidden flex flex-col items-start space-y-2" id="main-content">
<!-- Bot Message: Cart Summary -->
<div class="relative bg-white p-3 rounded-r-xl rounded-bl-xl shadow-sm max-w-[85%] bubble-in animate-message-pop">
<div class="text-[14.2px] leading-[19px] whitespace-pre-wrap">🛒 Your Cart:
1x Galaxy Black Granite (100 sqft)
1x Organic A2 Milk (1L)

Total: <span class="font-bold">₹45,095</span>

Deliver to: <span class="text-primary font-semibold">842 Market St, Suite 102?</span></div>
<div class="text-right mt-1">
<span class="text-[11px] text-[#667781]">10:42 AM</span>
</div>
</div>
<!-- Quick Reply Buttons -->
<div class="flex flex-col w-[85%] space-y-1">
<button class="opacity-0 animate-slide-up delay-1 btn-interact animate-pulse-cta w-full bg-white text-[#008069] py-3 rounded-xl shadow-sm font-semibold hover:bg-slate-50 border-b border-slate-100 flex items-center justify-center gap-2" onclick="confirmOrder()">
<span>Yes, Deliver Here</span>
</button>
<button class="opacity-0 animate-slide-up delay-2 btn-interact w-full bg-white text-[#008069] py-3 rounded-xl shadow-sm font-semibold hover:bg-slate-50 border-b border-slate-100">
                    Change Address
                </button>
<button class="opacity-0 animate-slide-up delay-3 btn-interact w-full bg-white text-status-error py-3 rounded-xl shadow-sm font-semibold hover:bg-red-50">
                    Cancel Order
                </button>
</div>
</div>
<!-- Dynamic Response Section (Hidden Initially) -->
<div class="hidden flex flex-col items-start space-y-2" id="payment-step">
<!-- User Interaction Bubble -->
<div class="self-end bg-[#dcf8c6] p-3 rounded-l-xl rounded-br-xl shadow-sm max-w-[85%] relative mb-4 animate-message-pop">
<div class="text-[14.2px] leading-[19px]">Yes, Deliver Here</div>
<div class="text-right mt-1 flex items-center justify-end gap-1">
<span class="text-[11px] text-[#667781]">10:43 AM</span>
<span class="material-symbols-outlined text-[16px] text-[#8696a0] check-read" style="font-variation-settings: 'FILL' 1;">done_all</span>
</div>
</div>
<!-- Bot Message: Payment -->
<div class="animate-message-pop delay-1 w-full flex flex-col items-start space-y-2">
<div class="relative bg-white p-3 rounded-r-xl rounded-bl-xl shadow-sm max-w-[85%] bubble-in">
<div class="text-[14.2px] leading-[19px]">Perfect! Choose your payment method:</div>
<div class="text-right mt-1">
<span class="text-[11px] text-[#667781]">10:43 AM</span>
</div>
</div>
<div class="flex flex-col w-[85%] space-y-1">
<button class="opacity-0 animate-slide-up delay-2 btn-interact w-full bg-white text-[#008069] py-3 rounded-xl shadow-sm font-semibold hover:bg-slate-50 border-b border-slate-100 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">payments</span>
                        Pay Online (Razorpay)
                    </button>
<button class="opacity-0 animate-slide-up delay-3 btn-interact w-full bg-white text-[#008069] py-3 rounded-xl shadow-sm font-semibold hover:bg-slate-50">
<span class="material-symbols-outlined text-[20px]">local_atm</span>
                        Cash on Delivery
                    </button>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Message Bar -->
<div class="fixed bottom-0 w-full bg-[#f0f2f5] px-4 py-3 flex items-center gap-3 z-50">
<div class="flex items-center gap-3 text-[#54656f]">
<span class="material-symbols-outlined cursor-pointer">sentiment_satisfied</span>
<span class="material-symbols-outlined cursor-pointer">add</span>
</div>
<div class="flex-1 bg-white rounded-full px-4 py-2 flex items-center">
<input class="w-full bg-transparent border-none focus:ring-0 text-[15px] outline-none" placeholder="Type a message" type="text"/>
</div>
<div class="w-12 h-12 rounded-full bg-[#00a884] flex items-center justify-center text-white shadow-md cursor-pointer btn-interact">
<span class="material-symbols-outlined">mic</span>
</div>
</div>
<script>
    // Initial sequence: Show typing then show message
    window.addEventListener('DOMContentLoaded', () => {
        const typing = document.getElementById('typing-indicator');
        const content = document.getElementById('main-content');
        
        setTimeout(() => {
            typing.classList.add('hidden');
            content.classList.remove('hidden');
        }, 1200);
    });

    function confirmOrder() {
        const paymentStep = document.getElementById('payment-step');
        paymentStep.classList.remove('hidden');
        
        // Scroll to bottom
        const container = document.getElementById('chat-canvas');
        setTimeout(() => {
            container.scrollTo({
                top: container.scrollHeight,
                behavior: 'smooth'
            });
        }, 100);

        // Visual feedback for selected interaction
        const buttonContainer = event.currentTarget.closest('.flex-col');
        buttonContainer.style.opacity = '0.4';
        buttonContainer.style.pointerEvents = 'none';
        
        // Remove pulse from previous CTA
        event.currentTarget.classList.remove('animate-pulse-cta');
    }

    // Handle enter key in input
    document.querySelector('input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const text = e.target.value;
            if (text.trim() !== "") {
                e.target.value = "";
            }
        }
    });
</script>
</body></html>
