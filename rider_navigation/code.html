<style>

      overscroll-behavior-y: contain;
    }
    .map-mask {
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }
    /* Pulsing animation for current location */
    @keyframes pulse-ring {
      0% { transform: scale(0.33); opacity: 1; }
      80%, 100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-dot::before {
      content: '';
      position: absolute;
      width: 300%;
      height: 300%;
      left: -100%;
      top: -100%;
      background-color: #0c831f;
      border-radius: 100%;
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;

<script>
    let currentState = 1;
    function updateStatus() {
      const btn = document.getElementById('statusBtn');
      const text = document.getElementById('btnText');
      
      if (currentState === 1) {
        text.innerText = 'Order Picked Up';
        btn.classList.replace('bg-primary', 'bg-tertiary-container');
        btn.classList.add('text-on-tertiary-container');
        currentState = 2;
      } else if (currentState === 2) {
        text.innerText = 'Delivered';
        btn.classList.replace('bg-tertiary-container', 'bg-status-success');
        btn.classList.remove('text-on-tertiary-container');
        btn.classList.add('text-white');
        currentState = 3;
      } else {
        // Reset or Complete logic
        alert('Order Successfully Delivered!');
        window.location.reload();
      }
    }

    // Add haptic-like feedback on touch
    document.querySelectorAll('button, a').forEach(el => {
      el.addEventListener('touchstart', () => {
        if (window.navigator.vibrate) window.navigator.vibrate(10);
      });
    });
  </script>
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('../pwa/rider/service-worker.js').catch(()=>{}); }</script>
